<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNO — WE🕊️</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Rajdhani',sans-serif;background:#03000f;color:#fff;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:20px;overflow-x:hidden}
.na-bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.na-floor{position:absolute;bottom:0;left:-20%;right:-20%;height:55%;
  background-image:linear-gradient(rgba(0,200,255,.09) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,200,255,.09) 1px,transparent 1px);
  background-size:55px 55px;transform:perspective(500px) rotateX(65deg);transform-origin:bottom;opacity:.55}
.na-beam{position:absolute;top:0;left:50%;transform:translateX(-50%);width:3px;height:42%;
  background:linear-gradient(180deg,rgba(0,200,255,.6),transparent);filter:blur(2px)}
.na-glow1,.na-glow2{position:absolute;border-radius:50%;filter:blur(80px)}
.na-glow1{width:500px;height:180px;background:rgba(0,200,255,.06);top:15%;left:-80px}
.na-glow2{width:380px;height:160px;background:rgba(160,0,255,.06);bottom:8%;right:-50px}

.header{position:relative;z-index:10;width:100%;max-width:800px;text-align:center;margin-bottom:20px}
.title{font-family:'Russo One',sans-serif;font-size:2.5em;color:#00c8ff;letter-spacing:3px;
  margin-bottom:8px;text-shadow:0 0 20px rgba(0,200,255,.6)}
.back-btn{position:absolute;left:0;top:50%;transform:translateY(-50%);padding:8px 16px;
  background:rgba(0,200,255,.12);border:1px solid rgba(0,200,255,.3);color:#00c8ff;
  font-family:'Russo One',sans-serif;font-size:.85em;cursor:pointer;border-radius:3px;
  transition:all .2s;text-decoration:none}
.back-btn:hover{background:rgba(0,200,255,.22);transform:translateY(-50%) translateY(-2px)}

.game-container{position:relative;z-index:10;width:100%;max-width:800px;background:rgba(0,200,255,.04);
  border:1px solid rgba(0,200,255,.15);border-radius:2px;padding:30px;backdrop-filter:blur(12px)}
.game-container::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,200,255,.5),transparent)}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;display:flex;
  align-items:center;justify-content:center;padding:20px}
.modal.hidden{display:none}
.modal-content{background:rgba(3,0,15,.98);border:1px solid rgba(0,200,255,.3);border-radius:8px;
  padding:40px 30px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,200,255,.2)}
.modal-title{font-family:'Russo One',sans-serif;font-size:1.8em;color:#00c8ff;text-align:center;
  margin-bottom:30px;letter-spacing:2px}
.mode-options{display:flex;flex-direction:column;gap:15px}
.mode-btn{padding:18px 24px;background:rgba(0,200,255,.08);border:1px solid rgba(0,200,255,.25);
  color:#00c8ff;font-family:'Rajdhani',sans-serif;font-size:1.1em;font-weight:600;cursor:pointer;
  border-radius:6px;transition:all .3s;text-align:left;display:flex;align-items:center;gap:12px}
.mode-btn:hover{background:rgba(0,200,255,.18);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,200,255,.3)}
.mode-icon{font-size:1.5em}
.mode-text{flex:1}
.mode-desc{font-size:.8em;color:rgba(0,200,255,.6);font-weight:400;margin-top:4px}

.invite-screen{display:none}
.invite-screen.active{display:block}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,rgba(0,200,255,.15),rgba(0,255,157,.15));
  border:1px solid rgba(0,200,255,.4);color:#00c8ff;font-family:'Russo One',sans-serif;font-size:1em;
  letter-spacing:1px;cursor:pointer;border-radius:4px;transition:all .3s;margin-top:10px}
.btn:hover{background:linear-gradient(135deg,rgba(0,200,255,.25),rgba(0,255,157,.25));
  transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,200,255,.3)}
.btn-secondary{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7)}
.btn-secondary:hover{background:rgba(255,255,255,.08)}
.room-code-display{font-family:'Share Tech Mono',monospace;font-size:2em;color:#00ff9d;text-align:center;
  letter-spacing:8px;padding:20px;background:rgba(0,255,157,.08);border:2px solid rgba(0,255,157,.3);
  border-radius:6px;margin:20px 0}

.uno-game{display:none}
.uno-game.active{display:block}
.game-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;
  padding:15px;background:rgba(0,200,255,.05);border:1px solid rgba(0,200,255,.15);border-radius:4px;
  flex-wrap:wrap;gap:10px}
.turn-indicator{padding:8px 16px;background:rgba(0,255,157,.15);border:1px solid rgba(0,255,157,.3);
  border-radius:20px;font-family:'Russo One',sans-serif;font-size:.9em;color:#00ff9d;letter-spacing:1px}
.opponent-hand{text-align:center;margin-bottom:30px}
.opponent-label{font-size:.85em;color:rgba(0,200,255,.6);margin-bottom:10px}
.opponent-cards{display:flex;justify-content:center;gap:5px;flex-wrap:wrap}
.card-back{width:50px;height:70px;background:linear-gradient(135deg,#1a0a2e,#0a1a2e);border-radius:6px;
  border:1px solid rgba(0,200,255,.3);display:flex;align-items:center;justify-content:center;
  font-size:.5em;color:rgba(0,200,255,.5)}

.play-area{background:rgba(0,200,255,.05);padding:30px;border-radius:8px;margin-bottom:20px;
  min-height:150px;display:flex;align-items:center;justify-content:center;gap:30px}
.pile{text-align:center}
.pile-label{font-family:'Share Tech Mono',monospace;font-size:.65em;color:rgba(0,200,255,.4);
  letter-spacing:1px;margin-bottom:6px}
.deck{width:70px;height:100px;background:linear-gradient(135deg,#1a0a2e,#0a1a2e);border-radius:8px;
  border:2px solid rgba(0,200,255,.3);cursor:pointer;transition:all .2s;display:flex;
  align-items:center;justify-content:center;font-size:.6em;color:rgba(0,200,255,.5)}
.deck:hover{transform:translateY(-5px);box-shadow:0 5px 15px rgba(0,200,255,.3)}
.top-card{width:80px;height:110px;border-radius:8px;border:2px solid #000;font-family:'Russo One',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.5em;
  box-shadow:0 4px 12px rgba(0,0,0,.4)}

.my-hand{text-align:center}
.my-label{font-size:.85em;color:rgba(0,200,255,.6);margin-bottom:10px}
.hand-cards{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:20px;
  background:rgba(0,0,0,.2);border-radius:8px}
.card{width:60px;height:85px;border-radius:6px;border:2px solid #000;cursor:pointer;
  transition:all .2s;font-family:'Russo One',sans-serif;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:1.2em;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.card:hover{transform:translateY(-10px);box-shadow:0 6px 20px rgba(0,0,0,.5)}
.card.disabled{opacity:.4;cursor:not-allowed}
.card.disabled:hover{transform:none}

.uno-btn{padding:12px 24px;background:linear-gradient(135deg,#ff4444,#ff6666);border:none;
  color:#fff;font-family:'Russo One',sans-serif;font-size:1em;letter-spacing:1px;
  cursor:pointer;border-radius:6px;transition:all .2s;margin-top:10px;display:none}
.uno-btn.active{display:inline-block}
.uno-btn:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(255,68,68,.5)}

.color-picker{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(13,5,18,.98);padding:30px;border-radius:12px;border:1px solid rgba(255,100,180,.3);
  z-index:2000;display:none;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.color-picker.show{display:block}
.color-picker-title{font-family:'Syne',sans-serif;font-size:1.2em;font-weight:700;
  color:#ff6fa8;text-align:center;margin-bottom:20px}
.color-options{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
.color-option{width:80px;height:80px;border-radius:12px;cursor:pointer;border:3px solid transparent;
  transition:all .3s}
.color-option:hover{border-color:white;transform:scale(1.1)}

.game-over{display:none;text-align:center;padding:40px 20px}
.game-over.active{display:block}
.game-over-title{font-family:'Russo One',sans-serif;font-size:2.5em;color:#00ff9d;margin-bottom:20px;
  text-shadow:0 0 20px rgba(0,255,157,.6)}

.hidden{display:none!important}
</style>
</head>
<body>

<div class="na-bg"><div class="na-floor"></div><div class="na-beam"></div>
<div class="na-glow1"></div><div class="na-glow2"></div></div>

<div class="header">
  <a href="index.html" class="back-btn">← BACK</a>
  <div class="title">🃏 UNO</div>
</div>

<div class="modal" id="modeModal">
  <div class="modal-content">
    <div class="modal-title">SELECT GAME MODE</div>
    <div class="mode-options">
      <button class="mode-btn" onclick="selectMode('ai')">
        <span class="mode-icon">🤖</span>
        <div class="mode-text"><div>Play vs AI</div>
        <div class="mode-desc">Challenge the computer</div></div>
      </button>
      <button class="mode-btn" onclick="selectMode('room')">
        <span class="mode-icon">🔗</span>
        <div class="mode-text"><div>Create Room</div>
        <div class="mode-desc">Play online with friend</div></div>
      </button>
    </div>
  </div>
</div>

<div class="game-container">
  
  <div class="invite-screen" id="roomScreen">
    <div class="modal-title">CREATE ROOM</div>
    <div class="room-code-display" id="roomCode">------</div>
    <button class="btn" onclick="copyCode()">📋 COPY CODE</button>
    <button class="btn" onclick="shareLink()">🔗 SHARE LINK</button>
    <div style="text-align:center;padding:20px" id="waitingText">Waiting for opponent...</div>
    <button class="btn btn-secondary" onclick="backToMenu()">CANCEL</button>
  </div>

  <div class="uno-game" id="unoGame">
    <div class="game-info">
      <div class="turn-indicator" id="turnText">YOUR TURN</div>
      <div style="font-size:.85em;color:rgba(0,200,255,.7)" id="statusText"></div>
    </div>

    <div class="opponent-hand">
      <div class="opponent-label">OPPONENT</div>
      <div class="opponent-cards" id="opponentCards"></div>
    </div>

    <div class="play-area">
      <div class="pile">
        <div class="pile-label">DRAW DECK</div>
        <div class="deck" onclick="drawCard()">UNO</div>
      </div>
      <div class="pile">
        <div class="pile-label">DISCARD PILE</div>
        <div class="top-card" id="topCard"></div>
      </div>
    </div>

    <div class="my-hand">
      <div class="my-label">YOUR HAND</div>
      <div class="hand-cards" id="myCards"></div>
      <button class="uno-btn" id="unoBtn" onclick="callUno()">🔥 CALL UNO!</button>
    </div>

    <div style="text-align:center;margin-top:20px">
      <button class="btn btn-secondary" onclick="quitGame()">QUIT</button>
    </div>
  </div>

  <div class="game-over" id="gameOver">
    <div class="game-over-title">GAME OVER</div>
    <div id="winner" style="font-size:1.3em;color:rgba(0,200,255,.9);margin-bottom:30px"></div>
    <button class="btn" onclick="playAgain()">PLAY AGAIN</button>
    <button class="btn btn-secondary" onclick="window.location.href='index.html'">MENU</button>
  </div>

</div>

<div class="color-picker" id="colorPicker">
  <div class="color-picker-title">CHOOSE COLOR</div>
  <div class="color-options">
    <div class="color-option" style="background:#ff4444" onclick="pickColor('R')"></div>
    <div class="color-option" style="background:#4444ff" onclick="pickColor('B')"></div>
    <div class="color-option" style="background:#44ff44" onclick="pickColor('G')"></div>
    <div class="color-option" style="background:#ffff44" onclick="pickColor('Y')"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const G={mode:null,deck:[],discardPile:[],players:[{hand:[],calledUno:false},{hand:[],calledUno:false}],
  turn:0,currentColor:null,topCard:null,over:false,roomId:null,playerId:null,db:null,roomRef:null,
  pendingWild:null};

const COLORS={R:'#ff4444',B:'#4444ff',G:'#44ff44',Y:'#ffff44'};
const CARDS=['R0','R1','R2','R3','R4','R5','R6','R7','R8','R9','RS','RR','RD2',
  'B0','B1','B2','B3','B4','B5','B6','B7','B8','B9','BS','BR','BD2',
  'G0','G1','G2','G3','G4','G5','G6','G7','G8','G9','GS','GR','GD2',
  'Y0','Y1','Y2','Y3','Y4','Y5','Y6','Y7','Y8','Y9','YS','YR','YD2',
  'W','W','W','W','WD4','WD4','WD4','WD4'];

window.onload=()=>{
  const p=new URLSearchParams(window.location.search).get('roomId');
  if(p){G.roomId=p;document.getElementById('modeModal').classList.add('hidden');
    document.getElementById('roomScreen').classList.add('active');
    document.getElementById('roomCode').textContent=p;joinRoom();}
  
  const s=JSON.parse(localStorage.getItem('we_settings')||'{}');
  if(s.firebaseApiKey&&s.firebaseDatabaseUrl){
    if(!firebase.apps.length)firebase.initializeApp({apiKey:s.firebaseApiKey,
      databaseURL:s.firebaseDatabaseUrl,projectId:s.firebaseProjectId||'we-dove'});
    G.db=firebase.database();}
  
  const u=JSON.parse(sessionStorage.getItem('we_user')||'null');
  G.playerId=u?u.username:'P'+Math.floor(Math.random()*10000);
};

function selectMode(m){G.mode=m;document.getElementById('modeModal').classList.add('hidden');
  m==='ai'?startAI():createRoom();}
function backToMenu(){if(G.roomRef)G.roomRef.remove();
  document.querySelectorAll('.invite-screen,.uno-game').forEach(e=>e.classList.remove('active'));
  document.getElementById('modeModal').classList.remove('hidden');}

function startAI(){document.getElementById('unoGame').classList.add('active');init();}

function createRoom(){const c=Array(6).fill(0).map(()=>'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'[Math.floor(Math.random()*36)]).join('');
  G.roomId=c;G.roomRef=G.db.ref(`gameRooms/${c}`);
  G.roomRef.set({code:c,gameType:'uno',host:G.playerId,guest:null,status:'waiting',
    createdAt:firebase.database.ServerValue.TIMESTAMP});
  document.getElementById('roomScreen').classList.add('active');
  document.getElementById('roomCode').textContent=c;
  G.roomRef.on('value',s=>{const r=s.val();if(r&&r.guest&&r.status==='waiting'){
    G.roomRef.update({status:'playing'});startOnline();}});}

function joinRoom(){G.roomRef=G.db.ref(`gameRooms/${G.roomId}`);
  G.roomRef.once('value').then(s=>{const r=s.val();if(!r){alert('Room not found');return;}
    if(r.guest){alert('Room full');return;}
    G.roomRef.update({guest:G.playerId,status:'playing'});startOnline();});}

function startOnline(){document.getElementById('roomScreen').classList.remove('active');
  document.getElementById('unoGame').classList.add('active');init();
  G.roomRef.child('gameState').on('value',s=>{const st=s.val();
    if(st&&st.lastMove&&st.lastMoveBy!==G.playerId){applyMove(st.lastMove);}});}

function copyCode(){navigator.clipboard.writeText(document.getElementById('roomCode').textContent).then(()=>alert('Copied!'));}
function shareLink(){const l=`${window.location.origin}${window.location.pathname}?roomId=${document.getElementById('roomCode').textContent}`;
  navigator.clipboard.writeText(l).then(()=>alert('Link copied!'));}

function init(){G.deck=[...CARDS,...CARDS];shuffleDeck();
  G.players=[{hand:[],calledUno:false},{hand:[],calledUno:false}];
  for(let i=0;i<7;i++){G.players[0].hand.push(G.deck.pop());G.players[1].hand.push(G.deck.pop());}
  G.topCard=G.deck.pop();G.currentColor=G.topCard[0];G.discardPile=[G.topCard];
  G.turn=0;G.over=false;render();}

function shuffleDeck(){for(let i=G.deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));
  [G.deck[i],G.deck[j]]=[G.deck[j],G.deck[i]];}}

function render(){renderOpponent();renderTopCard();renderMyHand();updateTurn();
  const uno=G.players[0].hand.length===1;document.getElementById('unoBtn').style.display=uno?'block':'none';}

function renderOpponent(){const c=Array(G.players[1].hand.length).fill(0).map(()=>
  '<div class="card-back">UNO</div>').join('');
  document.getElementById('opponentCards').innerHTML=c;}

function renderTopCard(){const c=G.topCard,el=document.getElementById('topCard');
  el.style.background=COLORS[G.currentColor]||'#fff';
  el.textContent=c.slice(1)||c;el.style.color='#000';}

function renderMyHand(){const html=G.players[0].hand.map((c,i)=>{
  const playable=canPlay(c);return `<div class="card ${playable?'':'disabled'}" 
  style="background:${COLORS[c[0]]||'#333'};color:#000" onclick="playCard(${i})">${c.slice(1)||c}</div>`;
}).join('');document.getElementById('myCards').innerHTML=html;}

function canPlay(c){if(c[0]==='W')return true;
  return c[0]===G.currentColor||c.slice(1)===G.topCard.slice(1);}

function playCard(i){if(G.over||G.turn!==0)return;
  const c=G.players[0].hand[i];if(!canPlay(c))return;
  G.players[0].hand.splice(i,1);G.discardPile.push(c);G.topCard=c;
  
  if(c[0]==='W'){G.pendingWild=c;document.getElementById('colorPicker').classList.add('show');return;}
  else{G.currentColor=c[0];processCard(c);if(G.players[0].hand.length===0){end(0);return;}
    sync({type:'play',card:c,color:G.currentColor,turn:1});nextTurn();}}

function pickColor(col){G.currentColor=col;document.getElementById('colorPicker').classList.remove('show');
  if(G.pendingWild){processCard(G.pendingWild);G.pendingWild=null;
    if(G.players[0].hand.length===0){end(0);return;}
    sync({type:'play',card:G.topCard,color:G.currentColor,turn:1});nextTurn();}}

function processCard(c){const v=c.slice(1);
  if(v==='S'){}else if(v==='R'){}else if(v==='D2'){drawCards(1,2);}
  else if(v==='D4'||c==='WD4'){drawCards(1,4);}}

function drawCard(){if(G.over||G.turn!==0)return;
  if(G.deck.length===0){G.deck=[...G.discardPile.slice(0,-1)];shuffleDeck();G.discardPile=[G.topCard];}
  const c=G.deck.pop();G.players[0].hand.push(c);render();
  sync({type:'draw',card:c,turn:1});nextTurn();}

function drawCards(player,n){for(let i=0;i<n;i++){
  if(G.deck.length===0){G.deck=[...G.discardPile.slice(0,-1)];shuffleDeck();G.discardPile=[G.topCard];}
  const c=G.deck.pop();G.players[player].hand.push(c);}render();}

function callUno(){G.players[0].calledUno=true;document.getElementById('statusText').textContent='UNO CALLED!';}

function nextTurn(){G.turn=1-G.turn;render();if(G.mode==='ai'&&G.turn===1)setTimeout(aiMove,1000);}

function updateTurn(){document.getElementById('turnText').textContent=G.turn===0?'YOUR TURN':'OPPONENT\'S TURN';}

function aiMove(){const playable=G.players[1].hand.filter(canPlay);
  if(playable.length>0){const c=playable[0];const i=G.players[1].hand.indexOf(c);
    G.players[1].hand.splice(i,1);G.discardPile.push(c);G.topCard=c;
    if(c[0]==='W'){const cols=['R','B','G','Y'];G.currentColor=cols[Math.floor(Math.random()*4)];}
    else{G.currentColor=c[0];}processCard(c);
    if(G.players[1].hand.length===0){end(1);return;}}
  else{drawCards(1,1);}
  G.turn=0;render();}

function applyMove(m){if(m.type==='play'){const c=m.card;G.discardPile.push(c);G.topCard=c;
  G.currentColor=m.color;processCard(c);if(G.players[1].hand.length===0){end(1);return;}}
  else if(m.type==='draw'){drawCards(1,1);}
  G.turn=0;render();}

function sync(m){if(G.mode!=='ai'&&G.roomRef)G.roomRef.child('gameState').set({
  lastMove:m,lastMoveBy:G.playerId,timestamp:firebase.database.ServerValue.TIMESTAMP});}

function end(w){G.over=true;if(G.roomRef)G.roomRef.update({status:'finished',winner:w});
  document.getElementById('unoGame').classList.remove('active');
  document.getElementById('gameOver').classList.add('active');
  document.getElementById('winner').textContent=(w===0?'YOU':'OPPONENT')+' WIN!';
  const u=JSON.parse(sessionStorage.getItem('we_user')||'null');
  if(u&&G.db)G.db.ref(`users/${u.username}/totalGames`).transaction(c=>(c||0)+1);}

function quitGame(){if(confirm('Quit?')){if(G.roomRef)G.roomRef.remove();window.location.href='index.html';}}
function playAgain(){document.getElementById('gameOver').classList.remove('active');
  if(G.roomRef)G.roomRef.remove();backToMenu();}
</script>
</body>
</html>
